kind = "web"
previewPath = "/dev-portal/"
title = "Kinectem Developer Portal"
version = "1.0.0"
id = "artifacts/dev-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dev-portal/" ]
localPort = 23288

[services.development]
run = "pnpm --filter @workspace/dev-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dev-portal", "run", "build" ]
publicDir = "artifacts/dev-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23288"
BASE_PATH = "/dev-portal/"
