kind = "web"
previewPath = "/app/"
title = "Kinectem"
version = "1.0.0"
id = "artifacts/kinectem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/app/" ]
localPort = 19515

[services.development]
run = "pnpm --filter @workspace/kinectem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kinectem", "run", "build" ]
publicDir = "artifacts/kinectem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19515"
BASE_PATH = "/app/"
