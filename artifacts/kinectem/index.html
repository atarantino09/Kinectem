<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Swallow the benign "ResizeObserver loop completed with undelivered
      // notifications" / "ResizeObserver loop limit exceeded" browser signal.
      // It fires a window `error` event whose `error` object is null (message
      // only), which @replit/vite-plugin-runtime-error-modal relabels as
      // "(unknown runtime error)" and pops up transiently (notably on mobile
      // while layout settles after login). This guard runs before the overlay
      // plugin's deferred module registers, so it wins listener ordering. It
      // only matches the message AND requires a null `error` object, so a real
      // error thrown inside an observer callback (non-null `error`) still
      // surfaces normally.
      (function () {
        window.addEventListener(
          "error",
          function (e) {
            if (
              e &&
              e.error == null &&
              typeof e.message === "string" &&
              e.message.indexOf("ResizeObserver loop") !== -1
            ) {
              e.stopImmediatePropagation();
              e.preventDefault();
            }
          },
          true,
        );
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Kinectem</title>
    <link rel="icon" type="image/png" href="logo-icon.png" />
    <link rel="apple-touch-icon" href="logo-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
