  # ------------------------------------------------------------------
  # Messaging endpoints
  # ------------------------------------------------------------------

  /api/v1/conversations:
    post:
      operationId: createConversation
      summary: Create or resume a conversation
      description: >
        Creates a new conversation with the given recipient. If an active conversation
        already exists between the same participants (same type, same participants),
        returns the existing conversation with 200 instead of creating a duplicate (201).
      tags:
        - Messaging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListItem'
        '200':
          description: Existing conversation returned (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    get:
      operationId: listConversations
      summary: List conversations (inbox)
      description: Returns a paginated list of the authenticated user's conversations, ordered by most recent activity.
      tags:
        - Messaging
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversations'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/conversations/unread-count:
    get:
      operationId: getUnreadCount
      summary: Get total unread message count
      description: Returns the total number of unread messages across all of the authenticated user's conversations.
      tags:
        - Messaging
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/conversations/{conversationId}:
    get:
      operationId: getConversation
      summary: Get a conversation by ID
      tags:
        - Messaging
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteConversation
      summary: Soft-delete a conversation (leaves for the other party)
      tags:
        - Messaging
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '204':
          description: Conversation deleted for requesting user
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/conversations/{conversationId}/messages:
    post:
      operationId: sendMessage
      summary: Send a message in a conversation
      tags:
        - Messaging
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
