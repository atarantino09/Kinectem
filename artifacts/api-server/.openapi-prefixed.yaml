        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/teams/{teamId}/members/{memberId}/decline:
    post:
      operationId: declineTeamInvite
      summary: Decline a pending team membership invite
      tags:
        - Team Members
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/MemberId'
      responses:
        '204':
          description: Invite declined (soft delete)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ------------------------------------------------------------------
  # Roster invite endpoints (B3)
  # ------------------------------------------------------------------

  /api/v1/teams/{teamId}/invites:
    post:
      operationId: createRosterInvite
      summary: Create a roster invite for a team
      tags:
        - Roster Invites
      parameters:
        - $ref: '#/components/parameters/TeamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInviteRequest'
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InviteCreateResolvedResponse'
                  - $ref: '#/components/schemas/InviteCreatePendingResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    resolved: '#/components/schemas/InviteCreateResolvedResponse'
                    pending: '#/components/schemas/InviteCreatePendingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    get:
      operationId: listRosterInvites
      summary: List invites for a team
      tags:
        - Roster Invites
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, accepted, declined, expired, withdrawn, resolved]
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of invites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInvitesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/teams/{teamId}/invites/{inviteId}:
    delete:
      operationId: withdrawRosterInvite
      summary: Withdraw a pending roster invite
      tags:
        - Roster Invites
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/InviteId'
      responses:
        '200':
          description: Invite withdrawn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/invites/{token}/accept:
    post:
      operationId: acceptRosterInvite
      summary: Accept a roster invite via token
      tags:
        - Roster Invites
      parameters:
        - $ref: '#/components/parameters/InviteToken'
      responses:
        '200':
          description: Invite accepted, team membership created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/invites/{token}/decline:
    post:
      operationId: declineRosterInvite
      summary: Decline a roster invite via token
      tags:
        - Roster Invites
      parameters:
        - $ref: '#/components/parameters/InviteToken'
      responses:
        '200':
          description: Invite declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/search:
    get:
      operationId: crossEntitySearch
      summary: Search users, organizations, and teams by name
      tags: [Search]
      security:
        - clerkSession: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string (min 3, max 100 characters)
          schema:
            type: string
            minLength: 3
            maxLength: 100
        - name: type
          in: query
          required: false
          description: >
            Comma-separated entity types to search. Defaults to all three.
            Valid values: users, organizations, teams.
          schema:
            type: string
            default: "users,organizations,teams"
        - name: limit
          in: query
          required: false
          description: Max results per entity type (1-50, default 10)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: cursor
          in: query
          required: false
          description: >
            Pagination cursor. When provided, type must contain exactly one value.
          schema:
            type: string
      responses:
        '200':
          description: Grouped search results with per-type pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    $ref: '#/components/schemas/UserSearchSection'
                  organizations:
                    $ref: '#/components/schemas/OrgSearchSection'
                  teams:
                    $ref: '#/components/schemas/TeamSearchSection'
        '400':
          description: Validation error or malformed cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    UserSearchResult:
      type: object
      required: [id, displayName, avatarUrl, type]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        type:
          type: string
          enum: [user]

    PublicUserResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - isOwnProfile
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        nickname:
          type: string
          nullable: true
          maxLength: 100
        bio:
          type: string
          nullable: true
          maxLength: 1000
        avatarUrl:
          type: string
          format: uri
          nullable: true
        coverPhotoUrl:
          type: string
          format: uri
          nullable: true
          description: Presigned S3 URL for the user's cover photo. Null if not set or suppressed for COPPA compliance.
        isOwnProfile:
          type: boolean
        isFollowing:
          type: boolean
        isConnection:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PrivateUserResponse:
      allOf:
        - $ref: '#/components/schemas/PublicUserResponse'
        - type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
            dateOfBirth:
              type: string
              format: date
              nullable: true

    UpdateUserRequest:
      type: object
      additionalProperties: false
      properties:
        bio:
          type: string
          nullable: true
          maxLength: 1000
        avatarUrl:
          type: string
          format: uri
          nullable: true
        nickname:
          type: string
          nullable: true
          maxLength: 100

    # ----------------------------------------------------------------
    # Contact info schemas (phones & addresses)
    # ----------------------------------------------------------------

    CreatePhoneRequest:
      type: object
      required:
        - number
        - type
      additionalProperties: false
      properties:
        number:
          type: string
          minLength: 1
          maxLength: 20
        type:
          type: string
          enum: [mobile, office, home, fax]

    UpdatePhoneRequest:
      type: object
      additionalProperties: false
      properties:
        number:
          type: string
          minLength: 1
          maxLength: 20
        type:
          type: string
          enum: [mobile, office, home, fax]

    PhoneResponse:
      type: object
      required:
        - id
        - number
        - type
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        type:
          type: string
          enum: [mobile, office, home, fax]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PhoneListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PhoneResponse'

    CreateAddressRequest:
      type: object
      required:
        - line1
        - city
        - postalCode
        - country
      additionalProperties: false
      properties:
        line1:
          type: string
          minLength: 1
          maxLength: 255
        line2:
          type: string
          maxLength: 255
          nullable: true
        city:
          type: string
          minLength: 1
          maxLength: 100
        state:
          type: string
          maxLength: 100
          nullable: true
        postalCode:
          type: string
          minLength: 1
          maxLength: 20
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code

    UpdateAddressRequest:
      type: object
      additionalProperties: false
      properties:
        line1:
          type: string
          minLength: 1
          maxLength: 255
        line2:
          type: string
          maxLength: 255
          nullable: true
        city:
          type: string
          minLength: 1
          maxLength: 100
        state:
          type: string
          maxLength: 100
          nullable: true
        postalCode:
          type: string
          minLength: 1
          maxLength: 20
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code

    AddressResponse:
      type: object
      required:
        - id
        - line1
        - city
        - postalCode
        - country
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
          nullable: true
        postalCode:
          type: string
        country:
          type: string
          minLength: 2
          maxLength: 2
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddressListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AddressResponse'

    ErrorResponse:
      type: object
      required:
        - code
        - error
        - correlationId
      properties:
        code:
          type: string
        error:
          type: string
        correlationId:
          type: string
          format: uuid

    OrganizationResponse:
      type: object
      required:
        - id
        - name
        - slug
        - isMember
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
          format: uri
        isMember:
          type: boolean
        role:
          type: string
          nullable: true
          enum:
            - owner
            - admin
            - member
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateOrganizationRequest:
      type: object
      required:
        - name
        - slug
      additionalProperties: false
      properties:
        name:
          type: string
        slug:
          type: string
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          minLength: 3
          maxLength: 50
        description:
          type: string
        website:
          type: string
          format: uri

    UpdateOrganizationRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string
          format: uri

    MemberResponse:
      type: object
      required:
        - userId
        - displayName
        - role
        - joinedAt
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
          format: uri
        role:
          type: string
          enum:
            - owner
            - admin
            - member
        joinedAt:
          type: string
          format: date-time

    AddMemberRequest:
      type: object
      required:
        - userId
        - role
      additionalProperties: false
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - admin
            - member

    UpdateMemberRoleRequest:
      type: object
      required:
        - role
      additionalProperties: false
      properties:
        role:
          type: string
          enum:
            - admin
            - member

    PaginatedOrganizationsResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedMembersResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MemberResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedPostsResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PostResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    AssetUploadRequest:
      type: object
      required:
        - fileName
        - fileType
        - fileSize
      additionalProperties: false
      properties:
        fileName:
          type: string
          maxLength: 255
        fileType:
          type: string
        fileSize:
          type: integer
          minimum: 1

    AssetUploadResponse:
      type: object
      required:
        - assetId
        - uploadUrl
        - expiresIn
      properties:
        assetId:
          type: string
          format: uuid
        uploadUrl:
          type: string
