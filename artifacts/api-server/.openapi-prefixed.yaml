  /api/v1/organizations/{orgId}/members/{userId}/transfer-ownership:
    post:
      operationId: transferOrganizationOwnership
      summary: Transfer organization ownership to another member
      description: |
        Transfers the `owner` role from the current owner to the target
        member in a single transaction. The target must already be a
        member of the organization. The previous owner is demoted to
        `admin` so they retain management permissions. Only the current
        owner may call this endpoint. Under concurrent transfers the
        loser may receive either `403` (the pre-check observed that the
        caller is no longer the owner) or `409` (the conditional update
        inside the transaction matched zero rows because another
        request finished first). In both cases the client should
        refetch and retry if needed.
      tags:
        - Members
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/MemberUserId"
      responses:
        "200":
          description: Ownership transferred; returns the new owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/posts:
    post:
      operationId: createPost
      summary: Create a new post
      description: |
        Creates a new short or long-form post.

        For long-form posts, when the request includes a `gameDate`,
        the post is treated as a **game recap** and the server
        auto-tags every accepted player on the team's roster (role
        = `player`, status = `accepted`). Each auto-tag is recorded
        as `approved` unless the tagged player or their parent has
        `requireTagConsent` enabled, in which case the tag is
        `pending` and only surfaces to the player, their parent, and
        admins until consent is granted. Any explicit `taggedUserIds`
        are merged with the auto-tag set (deduped by user; pending
        wins over approved).
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
