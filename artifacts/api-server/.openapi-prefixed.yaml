      type: object
      required:
        - id
        - postType
        - bodyTruncated
        - isEdited
        - createdAt
        - author
        - context
        - assets
        - reactionCount
        - hasReacted
        - commentCount
      properties:
        id:
          type: string
          format: uuid
        postType:
          type: string
          enum:
            - short
            - long
        title:
          type: string
          nullable: true
          example: "Player profile: rising star at WR"
        description:
          type: string
          nullable: true
          example: Building character, work ethic, and a love for the sport.
        body:
          type: string
          nullable: true
          example: Thanks to all the families who came out to support us.
        bodyTruncated:
          type: boolean
          description: True when description or body was truncated in the feed page
        isEdited:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/FeedAuthor"
        context:
          $ref: "#/components/schemas/FeedContext"
        assets:
          type: array
          items:
            $ref: "#/components/schemas/FeedPostAsset"
        reactionCount:
          type: integer
          minimum: 0
        hasReacted:
          type: boolean
        commentCount:
          type: integer
          minimum: 0
        recentReactorName:
          type: string
          nullable: true
          description: Display name of the most recent reactor, for "X and N others reacted" UI.
        shareCount:
          type: integer
          minimum: 0
          description: Re-share count for game-recap articles and highlights; always 0 for org posts.
        hasShared:
          type: boolean
          description: True when the requesting user has re-shared this post.
        sharedBy:
          nullable: true
          description: |
            Set when this card represents a re-share visible to the
            viewer (the share comes from the viewer or someone they
            follow). The card's `author` and `context` describe the
            original recap or highlight.
          allOf:
            - $ref: "#/components/schemas/FeedAuthor"
        sharedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO datetime the share was created; only set when `sharedBy` is set.
        gameDate:
          type: string
          format: date-time
          nullable: true
          description: |
            For long-form game-recap article cards, the date of the
            game the recap covers. Null on non-recap article cards
            and on highlight / org-post cards. Per task #190 the
            client allows sharing both recaps (article + gameDate)
            and highlights; only org posts are not shareable.
        canEdit:
          type: boolean
          description: |
            True when the requesting user is allowed to edit this
            post. Rules per kind:
              - article (game recap): author, co-author, or admin
                of the team's organization.
              - highlight: original uploader only.
              - org_post (Update): original author or admin of the
                post's organization.
            Drives the "Edit" affordance on the post page.
        canDelete:
          type: boolean
          description: |
            True when the requesting user is allowed to delete this
            post. Rules per kind:
              - article (game recap): the original author only —
                co-authors, coaches, and org admins do NOT get
                delete access even when `canEdit` is true.
              - highlight: the original uploader only.
              - org_post (Update): the original author only.
            Drives the "Delete" affordance on the post page.
        currentUserTag:
          nullable: true
          description: |
            The requesting viewer's own tag on this post, when one
            exists with status approved or pending. Used to render
            the "Remove me from this post" 3-dot menu item on feed
            cards. Null for guests, for users who aren't tagged,
            for declined / removed tags, and for org_post cards
            (which have no tag concept).
          allOf:
            - $ref: "#/components/schemas/CurrentUserTag"
