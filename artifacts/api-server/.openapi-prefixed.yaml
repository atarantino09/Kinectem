  /api/v1/auth/login:
    post:
      operationId: authLogin
      summary: Log in with email + password
      description: |
        Verifies credentials and, on success, sets the `kinectem_session`
        HttpOnly cookie. Subsequent requests should send that cookie.

        If the account is an under-13 athlete whose guardian has not yet
        confirmed, returns `403` with an extended error body that
        includes `pendingGuardianConfirmation: true` and
        `guardianConfirmExpired: boolean`.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: coach@kinectem.demo
                password:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Logged in. Sets the `kinectem_session` cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Account is waiting on guardian confirmation. Body includes
            `pendingGuardianConfirmation: true`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/signup:
    post:
      operationId: authSignup
      summary: Create a new account
      description: |
        Creates a new user. Athletes under 13 must supply
        `guardianEmail` and `guardianConsent: true`; in that case the
        account is created in a "pending guardian confirmation" state
        and the response body includes `pendingGuardianConfirmation:
        true` instead of setting a session cookie.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - password
                - role
              properties:
                firstName:
                  type: string
                  minLength: 1
                  example: Avery
                lastName:
                  type: string
                  minLength: 1
                  example: Bennett
                email:
                  type: string
                  format: email
                  example: jordan@kinectem.demo
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum:
                    - athlete
                    - coach
                    - parent
                    - admin
                dateOfBirth:
                  type: string
                  format: date
                  nullable: true
                parentId:
                  type: string
                  format: uuid
                  nullable: true
                guardianEmail:
                  type: string
                  format: email
                  nullable: true
                guardianConsent:
                  type: boolean
      responses:
        "201":
          description: Account created. Sets a session cookie unless guardian confirmation is pending.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PrivateUserResponse"
                  - type: object
                    properties:
                      pendingGuardianConfirmation:
                        type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Log out the current session
      description: |
        Destroys the server-side cookie session and clears the cookie.
        Bearer-token clients should additionally pass the refresh token
        in the body — when present, the server revokes it so it can no
        longer be used at `POST /auth/refresh`. Idempotent: callers
        without either credential still get `204`.
      tags:
        - Auth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: |
                    Refresh token previously issued by `/auth/token` or
                    `/auth/refresh`. Optional; only needed by bearer-token
                    clients that want to revoke their refresh token at
                    sign-out time.
      responses:
        "204":
          description: Logged out (idempotent).
  /api/v1/auth/token:
    post:
      operationId: authToken
      summary: Issue a bearer access + refresh token pair
      description: |
        Verifies email + password and, on success, issues a short-lived
        access token (~15 min) and a long-lived refresh token (30 days,
        single-use, rotated on every refresh). Used by the mobile app
        and any other non-browser client. The cookie session is **not**
        set on this endpoint — bearer auth is cookie-free.

        If the account is an under-13 athlete whose guardian has not yet
        confirmed, returns `403` with `pendingGuardianConfirmation: true`,
        matching the behavior of `/auth/login`.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: coach@kinectem.demo
                password:
                  type: string
                  minLength: 1
                deviceLabel:
                  type: string
                  maxLength: 120
                  description: |
                    Optional human label the client can pass so a future
                    "active sessions" UI can tell devices apart (e.g.
                    `"iPhone 15 Pro"`).
      responses:
        "200":
          description: Token pair issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenIssueResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Account is waiting on guardian confirmation. Body includes
            `pendingGuardianConfirmation: true`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Rotate a refresh token for a fresh access + refresh pair
      description: |
        Exchanges a refresh token for a new access + refresh pair.
        Refresh tokens **rotate** on every use — the presented token is
        immediately revoked and replaced. Replaying a consumed refresh
        token returns `401` (this is the standard mitigation for
        stolen-token replay; the client should sign the user out and
        force a fresh login on `401` here).
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: New token pair issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/password-reset/request:
    post:
      operationId: authPasswordResetRequest
      summary: Request a password reset email
      description: |
        Always returns `200` even when the email is unknown, to avoid
        leaking which addresses are registered.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: maya@kinectem.demo
      responses:
        "200":
          description: Reset email sent if the address is registered.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - message
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    example: Want to grab some film review tomorrow?
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/password-reset/complete:
    post:
      operationId: authPasswordResetComplete
      summary: Complete a password reset
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/age-check:
    post:
      operationId: authAgeCheck
      summary: Neutral age gate before signup
      description: |
        Task #359 — COPPA Phase 1 neutral age gate. The client posts the
        visitor's date of birth ONCE before the rest of the signup form
        is shown. The server returns whether the visitor is under 13 and
        sets a short-lived signed cookie carrying ONLY that boolean — the
        date of birth itself is never stored client-side. A failed gate
        does not block signup outright (children can still sign up via
        the verifiable parental consent flow), but a forged cookie cannot
        bypass the under-13 branch because /auth/signup verifies the
        cookie HMAC signature.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - dateOfBirth
              properties:
                dateOfBirth:
                  type: string
                  format: date
                  description: ISO 8601 date (YYYY-MM-DD).
      responses:
        "200":
          description: Age gate decision recorded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - requiresParentalConsent
                properties:
                  requiresParentalConsent:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/auth/guardian-consent/{token}:
    get:
      operationId: getParentalConsentNotice
      summary: Fetch the parental-consent notice for a token
      description: |
        Task #359 — Step 1 of the COPPA email-plus flow. The guardian
        opens the link in the first email; the client calls this
        endpoint to render the verbatim notice + checkbox. Returns 404
        if the token is invalid or already consumed, 410 if expired.
      tags:
        - Auth
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notice payload.
          content:
            application/json:
              schema:
                type: object
                required:
                  - athleteName
                  - guardianEmail
                  - noticeVersion
                  - noticeText
                  - state
                properties:
                  athleteName:
                    type: string
                  guardianEmail:
                    type: string
                    format: email
                  noticeVersion:
                    type: string
                  noticeText:
                    type: string
                  state:
                    type: string
                    enum:
                      - pending_notice
                      - pending_followup
                      - finalized
                      - revoked
                      - expired
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: This consent link has expired.
    post:
      operationId: submitParentalConsent
      summary: Guardian grants first-step consent (notice + checkbox)
      description: |
        Task #359 — Step 1 of the COPPA email-plus flow. The guardian
        ticked the box on the notice page; we mark the consent row as
        `pending_followup` and immediately email the second confirmation
        link to the same address. The athlete account remains disabled
        until the followup link is opened.
      tags:
        - Auth
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agreed
                - noticeVersion
              properties:
                agreed:
                  type: boolean
                noticeVersion:
                  type: string
      responses:
        "200":
          description: Consent recorded. Followup email queued.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - guardianEmail
                  - athleteName
                properties:
                  ok:
                    type: boolean
                  guardianEmail:
                    type: string
                    format: email
                  athleteName:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: This consent link has expired.
  /api/v1/auth/guardian-consent/{token}/finalize:
    post:
      operationId: finalizeParentalConsent
      summary: Guardian completes the email-plus second click
      description: |
        Task #359 — Step 2 of the COPPA email-plus flow. The guardian
        opens the link in the second email; we flip the consent row to
        `finalized` and the child's `account_status` to `active`. From
        this point the athlete may sign in.
      tags:
        - Auth
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Consent finalized; account activated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - athleteName
                properties:
                  ok:
                    type: boolean
                  athleteName:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: This consent link has expired.
  /api/v1/auth/guardian-revoke/{token}:
    post:
      operationId: revokeParentalConsent
      summary: Guardian revokes consent for an under-13 account
      description: |
        Task #359 — One-click revoke. Disables the child's account and
        appends a revocation entry to the audit log. Idempotent.
      tags:
        - Auth
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Consent revoked; account disabled.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - athleteName
                properties:
                  ok:
                    type: boolean
                  athleteName:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/auth/guardian-confirm:
    post:
      operationId: authGuardianConfirm
      summary: (Legacy) Guardian confirms an under-13 athlete account
      description: |
        Pre-task-359 single-step guardian confirmation. Retained for
        accounts created before the COPPA email-plus flow shipped; new
        signups walk through `/auth/guardian-consent/{token}` instead.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - guardianEmail
              properties:
                token:
                  type: string
                guardianEmail:
                  type: string
                  format: email
      responses:
        "200":
          description: Guardian confirmation succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - athleteName
                  - guardianEmail
                properties:
                  ok:
                    type: boolean
                  athleteName:
                    type: string
                  guardianEmail:
                    type: string
                    format: email
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/auth/guardian-resend:
    post:
      operationId: authGuardianResend
      summary: Resend a guardian-confirmation email
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: jordan@kinectem.demo
                password:
                  type: string
      responses:
        "200":
          description: Confirmation email re-sent to the guardian on file.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
