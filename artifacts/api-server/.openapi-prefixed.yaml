      operationId: inviteGuardian
      summary: Invite a guardian for a child user (COPPA)
      description: |
        Creates a pending guardian link and triggers a consent-request email to the provided address. Only the child themselves, an existing primary guardian, or a platform admin may invite.
      tags:
        - Guardians
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteGuardianRequest"
      responses:
        "200":
          description: |
            Privacy-safe dedup response. Returned when the email is already linked (pending or active) to this child. The server deliberately does not confirm whether an account exists; treat this as "invite processed" rather than an error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: Want to grab some film review tomorrow?
        "201":
          description: Guardian link created in pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardianLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/users/{userId}/children:
    get:
      operationId: listUserChildren
      summary: List child user links for a guardian
      tags:
        - Guardians
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Child links
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChildLinkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/guardian-links/{linkId}/accept:
    post:
      operationId: acceptGuardianLink
      summary: Accept a pending guardian invitation
      description: The invited guardian accepts the link. Marks the link active and records consent.
      tags:
        - Guardians
      parameters:
        - $ref: "#/components/parameters/LinkId"
      responses:
        "200":
          description: Guardian link accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardianLinkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/guardian-links/{linkId}/decline:
    post:
      operationId: declineGuardianLink
      summary: Decline a pending guardian invitation
      tags:
        - Guardians
      parameters:
        - $ref: "#/components/parameters/LinkId"
      responses:
        "204":
          description: Guardian link declined
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/guardian-links/{linkId}:
    delete:
      operationId: removeGuardianLink
      summary: Remove a guardian link
      description: |
        Either the guardian or the child (or primary guardian) may remove a link. Primary guardian cannot be removed if it is the last guardian.
      tags:
        - Guardians
      parameters:
        - $ref: "#/components/parameters/LinkId"
      responses:
        "204":
          description: Link removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/guardian-links/{linkId}/transfer-primary:
    post:
      operationId: transferPrimaryGuardian
      summary: Transfer the primary-guardian flag to this link
      description: Only the current primary guardian can transfer the primary role to another active link.
      tags:
        - Guardians
      parameters:
        - $ref: "#/components/parameters/LinkId"
      responses:
        "200":
          description: Primary transferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardianLinkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/conversations/search/contacts:
    get:
      operationId: searchConversationContacts
      summary: Search the caller's eligible messaging contacts
      description: |
        Returns users the authenticated user may start a DM with, matching a query string. Used to populate the new-conversation composer.
      tags:
        - Messaging
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (min 1 character)
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Matching contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationContactResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/invites/{token}/preview:
    get:
      operationId: previewRosterInvite
      summary: Preview a roster invite token (public, unauthenticated)
      description: Powers the invite landing page before the invitee signs in. Rate-limited.
      tags:
        - Roster Invites
      security: []
      parameters:
        - $ref: "#/components/parameters/InviteToken"
      responses:
        "200":
          description: Invite preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitePreviewResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: Invite expired or withdrawn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/posts/{postId}/preview:
    get:
      operationId: getPostPreview
      summary: Public preview of a post (used for social share unfurling and the public post page)
      tags:
        - Posts
      security: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Post preview (may be redacted for privacy)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostPreviewResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/posts/{postId}/og-image:
    get:
      operationId: getPostOgImage
      summary: Generated Open Graph preview image for a post
      tags:
        - Posts
      security: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: PNG image binary
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/search:
    get:
      operationId: crossEntitySearch
      summary: Search users, organizations, and teams by name
      tags:
        - Search
      security:
        - cookieSession: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string (min 3, max 100 characters)
          schema:
            type: string
            minLength: 3
            maxLength: 100
        - name: type
          in: query
          required: false
          description: |
            Comma-separated entity types to search. Defaults to all three. Valid values: users, organizations, teams.
          schema:
            type: string
            default: users,organizations,teams
        - name: limit
          in: query
          required: false
          description: Max results per entity type (1-50, default 10)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: cursor
          in: query
          required: false
          description: |
            Pagination cursor. When provided, type must contain exactly one value.
          schema:
            type: string
      responses:
        "200":
          description: Grouped search results with per-type pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    $ref: "#/components/schemas/UserSearchSection"
                  organizations:
                    $ref: "#/components/schemas/OrgSearchSection"
                  teams:
                    $ref: "#/components/schemas/TeamSearchSection"
        "400":
          description: Validation error or malformed cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/whoami:
    get:
      operationId: getWhoami
      summary: Get the currently authenticated session including masquerade state
      tags:
        - Auth
      responses:
        "200":
          description: Session details. When `authenticated` is false the other fields are omitted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - authenticated
                properties:
                  authenticated:
                    type: boolean
                  isMasquerading:
                    type: boolean
                  realUser:
                    $ref: "#/components/schemas/AdminWhoamiUser"
                  viewingAs:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/AdminWhoamiUser"
                additionalProperties: true
  /api/v1/reports:
    post:
      operationId: createContentReport
      summary: User-facing — report a piece of content for moderator review (deduped per user/content)
      tags:
        - Reports
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "200":
          description: Already reported by this user (dedupe — returns the existing open report)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReportResponse"
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/reports/mine:
    get:
      operationId: getMyReportForContent
      summary: Check whether the current user has already reported a specific piece of content
      tags:
        - Reports
      security:
        - cookieSession: []
      parameters:
        - name: contentType
          in: query
          required: true
          schema:
            type: string
            enum:
              - article
              - highlight
              - org_post
              - comment
        - name: contentId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Existing open report (if any) for this user/content pair
          content:
            application/json:
              schema:
                type: object
                required:
                  - alreadyReported
                  - report
                properties:
                  alreadyReported:
                    type: boolean
                  report:
                    nullable: true
                    type: object
                    required:
                      - id
                      - reason
                      - note
                      - status
                      - createdAt
                    properties:
                      id:
                        type: string
                        format: uuid
                      reason:
                        type: string
                        example: Spam or off-topic
                      note:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum:
                          - open
                          - resolved
                          - dismissed
                      createdAt:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/admin/analytics:
    get:
      operationId: getAdminAnalytics
      summary: Admin dashboard analytics (totals, time series, top lists)
      tags:
        - Admin
      security:
        - cookieSession: []
      responses:
        "200":
          description: Aggregate analytics for the admin dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalyticsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/users:
    get:
      operationId: listAdminUsers
      summary: List users (admin) with optional search, role filter, soft-deleted inclusion, and pagination
      tags:
        - Admin
      security:
        - cookieSession: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum:
              - athlete
              - parent
              - coach
              - admin
        - name: includeDeleted
          in: query
          required: false
          description: Pass "1" or "true" to include soft-deleted users in the result.
          schema:
            type: string
            enum:
              - "0"
              - "1"
              - "true"
              - "false"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Page of admin user records
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
                  pagination:
                    $ref: "#/components/schemas/AdminPagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createAdminUser
      summary: Create a user account (admin)
      tags:
        - Admin
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/admin/users/{userId}:
