      type: object
      description: |
        Standard error envelope used by every non-2xx response. Clients
        should branch on `code` (machine-readable, stable) and surface
        `error` (human-readable, may change) to the user. Some endpoints
        attach extra contextual fields alongside `error`/`code` (for
        example `pendingGuardianConfirmation` on the guardian-gated
        login path) — those are documented on the operation that emits
        them.
      required:
        - error
        - code
      properties:
        error:
          type: string
          description: Human-readable error message.
        code:
          type: string
          description: |
            Stable, machine-readable error code. The current set is:
            `AUTH_REQUIRED`, `FORBIDDEN`, `NOT_FOUND`,
            `VALIDATION_ERROR`, `CONFLICT`, `GONE`,
            `PAYLOAD_TOO_LARGE`, `UNPROCESSABLE`, `RATE_LIMITED`,
            `INTERNAL_ERROR`. Endpoints may also emit endpoint-specific
            codes (e.g. `DELETE_NOT_SUPPORTED`).
        correlationId:
          type: string
          format: uuid
          description: |
            Request correlation ID, suitable for support tickets.
            Reserved for future structured logging — the current server
            does not emit this field.
