        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedMessages:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/MessageResponse'
              - $ref: '#/components/schemas/DeletedMessageStub'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

