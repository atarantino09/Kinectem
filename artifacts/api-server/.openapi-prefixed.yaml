          type: string
          format: uuid
          nullable: true
          description: >
            When set, the conversation is sent on behalf of an organization.
            The authenticated user must be an admin or owner of the specified org.
        message:
          type: object
          additionalProperties: false
          properties:
            body:
              type: string
              maxLength: 10000
            assetIds:
              type: array
              items:
                type: string
                format: uuid
              maxItems: 10

    SendMessageRequest:
      type: object
      additionalProperties: false
      properties:
        body:
          type: string
          maxLength: 10000
        assetIds:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 10

