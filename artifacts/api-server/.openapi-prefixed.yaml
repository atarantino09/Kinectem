        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/masquerade/{userId}/start:
    parameters:
      - $ref: "#/components/parameters/UserId"
    post:
      operationId: startAdminMasquerade
      summary: Begin masquerading as another user (admin)
      tags:
        - Admin
      security:
        - cookieSession: []
      responses:
        "200":
          description: Masquerade started
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                  viewingAs:
                    $ref: "#/components/schemas/AdminWhoamiUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/admin/masquerade/stop:
    post:
      operationId: stopAdminMasquerade
      summary: Stop the current masquerade and return to the real admin session
      tags:
        - Admin
      security:
        - cookieSession: []
      responses:
        "200":
          description: Masquerade stopped
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/login:
    post:
      operationId: authLogin
      summary: Log in with email + password
      description: |
        Verifies credentials and, on success, sets the `kinectem_session`
        HttpOnly cookie. Subsequent requests should send that cookie.

        If the account is an under-13 athlete whose guardian has not yet
        confirmed, returns `403` with an extended error body that
        includes `pendingGuardianConfirmation: true` and
        `guardianConfirmExpired: boolean`.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: coach@kinectem.demo
                password:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Logged in. Sets the `kinectem_session` cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Account is waiting on guardian confirmation. Body includes
            `pendingGuardianConfirmation: true`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/signup:
    post:
      operationId: authSignup
      summary: Create a new account
      description: |
        Creates a new user. Athletes under 13 must supply
        `guardianEmail` and `guardianConsent: true`; in that case the
        account is created in a "pending guardian confirmation" state
        and the response body includes `pendingGuardianConfirmation:
        true` instead of setting a session cookie.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - password
                - role
              properties:
                firstName:
                  type: string
                  minLength: 1
                  example: Riley
                lastName:
                  type: string
                  minLength: 1
                  example: Foster
                email:
                  type: string
                  format: email
                  example: jordan@kinectem.demo
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum:
                    - athlete
                    - coach
                    - parent
                    - admin
                dateOfBirth:
                  type: string
                  format: date
                  nullable: true
                parentId:
                  type: string
                  format: uuid
                  nullable: true
                guardianEmail:
                  type: string
                  format: email
                  nullable: true
                guardianConsent:
                  type: boolean
      responses:
        "201":
          description: Account created. Sets a session cookie unless guardian confirmation is pending.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PrivateUserResponse"
                  - type: object
                    properties:
                      pendingGuardianConfirmation:
                        type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Log out the current session
      description: Destroys the server-side session and clears the cookie.
      tags:
        - Auth
      responses:
        "204":
          description: Logged out (idempotent).
  /api/v1/auth/password-reset/request:
    post:
      operationId: authPasswordResetRequest
      summary: Request a password reset email
      description: |
        Always returns `200` even when the email is unknown, to avoid
        leaking which addresses are registered.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: coach@kinectem.demo
      responses:
        "200":
          description: Reset email sent if the address is registered.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - message
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    example: Hey, you free this weekend for an extra session?
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/password-reset/complete:
    post:
      operationId: authPasswordResetComplete
      summary: Complete a password reset
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/guardian-confirm:
    post:
      operationId: authGuardianConfirm
      summary: Guardian confirms an under-13 athlete account
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - guardianEmail
              properties:
                token:
                  type: string
                guardianEmail:
                  type: string
                  format: email
      responses:
        "200":
          description: Guardian confirmation succeeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - athleteName
                  - guardianEmail
                properties:
                  ok:
                    type: boolean
                  athleteName:
                    type: string
                  guardianEmail:
                    type: string
                    format: email
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/auth/guardian-resend:
    post:
      operationId: authGuardianResend
      summary: Resend a guardian-confirmation email
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: marcus@kinectem.demo
                password:
                  type: string
      responses:
        "200":
          description: Confirmation email re-sent to the guardian on file.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - guardianEmail
                properties:
                  ok:
                    type: boolean
                  guardianEmail:
                    type: string
                    format: email
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/users:
    get:
      operationId: listSeedUsers
      summary: List seed users (development helper)
      description: |
        **Development helper**. Returns up to 100 user records that
        existing seed/test fixtures can pick from to log in. This
        endpoint will be removed before any external launch — do not
        build production clients on top of it.
      tags:
        - Auth
      deprecated: true
      security: []
      responses:
        "200":
          description: List of seed users.
          content:
            application/json:
              schema:
