openapi: 3.0.3
info:
  title: Kinectem API
  version: 0.1.0
  description: |
    Kinectem is a youth-sports recruiting platform. This is the JSON API
    that powers the web client (`artifacts/kinectem`) and is the contract
    that any future mobile client or third-party integrator must follow.

    This OpenAPI document is the single source of truth for the API. The
    Express server in `artifacts/api-server` is wrapped by the
    [`express-openapi-validator`](https://github.com/cdimascio/express-openapi-validator)
    middleware, so a request that does not match this spec is rejected
    before it reaches a handler. The TypeScript clients in
    `lib/api-codegen` and the Zod schemas in `lib/api-zod` are generated
    from this file — see `pnpm --filter @workspace/api-spec run codegen`.

    ## Conventions

    ### Naming
    - Resource paths are lower-kebab-case plurals: `/organizations`,
      `/team-members`, `/asset-messages`.
    - Path parameters and JSON property names are **camelCase**
      (`{orgId}`, `coverPhotoUrl`, `nextCursor`).
    - Operation IDs are camelCase verb-first (`listOrganizations`,
      `createTeam`, `setUserCoverPhoto`).

    ### Errors
    Every error response uses the same envelope:

    ```json
    { "error": "Human-readable message", "code": "MACHINE_READABLE_CODE" }
    ```

    See [`API_CONVENTIONS.md`](../../API_CONVENTIONS.md) for the full
    list of `code` values. Clients should branch on `code` and surface
    `error` to humans. The optional `correlationId` field is reserved
    for future structured logging.

    ### Pagination
    Paginated list endpoints return:

    ```json
    { "data": [...], "pagination": { "nextCursor": "...", "hasMore": true, "totalCount": 42 } }
    ```

    Pass the previous response's `nextCursor` as the `cursor` query
    parameter to fetch the next page. `totalCount` may be omitted for
    very large or expensive queries.

    ### Authentication
    The current production auth model is a **server-issued cookie
    session**. `POST /auth/login` (and `POST /auth/signup`) sets an
    `HttpOnly` cookie named `kinectem_session`; subsequent requests
    must send this cookie. There is no JWT or bearer token in the
    current release.

    A future release will add a long-lived **API key** scheme for
    server-to-server callers; it is documented here for forward
    compatibility but is not yet implemented.

    ### Versioning & deprecation
    The base path is `/api/v1`. Backwards-incompatible changes go to
    `/api/v2`. Endpoints that are kept only for backwards compatibility
    are marked `deprecated: true` in this spec.
servers:
  - url: /api/v1
    description: Versioned API base path
security:
  - cookieSession: []
paths:
  /api/v1/users:
    get:
      operationId: searchUsers
      summary: Search users by name
      tags:
        - Users
      security:
        - cookieSession: []
      parameters:
        - name: search
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSearchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/users/{userId}:
    get:
      operationId: getUserById
      summary: Get user profile
      description: |
        Returns either a `PrivateUserResponse` (when the caller is viewing their own profile, a linked guardian, or has permission to see private fields) or a `PublicUserResponse` (everyone else). The variants share all public fields; the private variant adds caller-only fields such as email and age-gated metadata. UI clients can treat the response as `PublicUserResponse` with optional private fields. A discriminator will be added in a future spec version.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User profile (public or private view depending on requester)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PrivateUserResponse"
                  - $ref: "#/components/schemas/PublicUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      operationId: updateUser
      summary: Update user profile (self only)
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/users/{userId}/cover-photo:
    put:
      operationId: setUserCoverPhoto
      summary: Set user cover photo
      description: Sets the user's cover photo to a confirmed image asset they own.
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAssetIdRequest"
      responses:
        "200":
          description: Cover photo set successfully. Returns updated user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteUserCoverPhoto
      summary: Remove user cover photo
      description: Removes the user's cover photo. Returns the updated profile with coverPhotoUrl set to null. Returning 200 with the full profile (rather than 204) is deliberate — it gives the client an updated profile snapshot without a follow-up GET.
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Cover photo removed. Returns updated user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/users/{userId}/avatar:
    put:
      operationId: setUserAvatar
      summary: Set user avatar
      description: Sets the user's avatar to a confirmed image asset they own.
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAssetIdRequest"
      responses:
        "200":
          description: Avatar set. Returns updated user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteUserAvatar
      summary: Remove user asset-backed avatar
      description: Removes the user's asset-backed avatar. The stored legacy URL (Clerk) is retained. Returns the updated user profile.
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Avatar removed. Returns updated user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/users/{userId}/sports:
    get:
      operationId: getUserSports
      summary: List the user's sports (self only)
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: The user's sports list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSportsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: updateUserSports
      summary: Replace the user's sports list (self only)
      description: Full-replace semantics — the submitted array overwrites the stored list.
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSportsRequest"
      responses:
        "200":
          description: Updated sports list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSportsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/users/{userId}/teams:
    get:
      operationId: listUserTeams
      summary: List teams the user belongs to
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTotal"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - pending
        - name: seasonId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of team memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUserTeamMembershipsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/users/me:
    get:
      operationId: getLoggedInUser
      summary: Get the authenticated user's full profile
      tags:
        - Users
      responses:
        "200":
          description: The authenticated user's private profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/users/me/settings:
    get:
      operationId: getMySettings
      summary: Get the authenticated user's settings bag
      tags:
        - Users
      responses:
        "200":
          description: The user's settings object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      operationId: updateMySettings
      summary: Shallow-merge a patch into the authenticated user's settings bag
      description: |
        Unknown keys are rejected with 400 (strict Zod schema). Empty body returns the current settings unchanged.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSettingsRequest"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/users/{userId}/organizations:
    get:
      operationId: listUserOrganizations
      summary: List organizations the user belongs to
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTotal"
      responses:
        "200":
          description: Paginated list of organizations the user belongs to
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrganizationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/organizations:
    post:
      operationId: createOrganization
      summary: Create a new organization
      tags:
        - Organizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      operationId: listOrganizations
      summary: List and search organizations
      tags:
        - Organizations
      parameters:
        - name: slug
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 2
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTotal"
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrganizationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/organizations/{orgId}:
    get:
      operationId: getOrganizationById
      summary: Get organization by ID
      tags:
        - Organizations
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      operationId: updateOrganization
      summary: Update organization details
      tags:
        - Organizations
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteOrganization
      summary: Delete organization (not yet supported)
      tags:
        - Organizations
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Organization deletion is not yet supported (DELETE_NOT_SUPPORTED), or the requester is not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/organizations/{orgId}/follow:
    post:
      operationId: followOrg
      summary: Follow an organization
      tags:
        - Follows
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "201":
          description: Follow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowOrgResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: unfollowOrg
      summary: Unfollow an organization
      tags:
        - Follows
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "204":
          description: Unfollowed (idempotent)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/organizations/{orgId}/followers:
    get:
      operationId: listOrgFollowers
      summary: List followers of an organization
      tags:
        - Follows
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/FollowLimit"
      responses:
        "200":
          description: Paginated list of followers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedFollowersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/organizations/{orgId}/members:
    get:
      operationId: listMembers
      summary: List members of an organization
      tags:
        - Members
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludeTotal"
      responses:
        "200":
          description: Paginated list of organization members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMembersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: addMember
      summary: Add a member to an organization
      tags:
        - Members
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/assets/upload:
    post:
      operationId: requestUpload
      summary: Request a presigned URL for asset upload
      description: |
        Step 1 of the 3-step asset upload flow:

        1. `POST /assets/upload` — this endpoint. Returns `{ assetId, uploadUrl, uploadHeaders, expiresIn }`.
        2. `PUT <uploadUrl>` — upload the binary **directly to the signed storage URL**
           (Supabase / S3-compatible). This request does NOT go through the Kinectem
           API. Use the exact headers from `uploadHeaders` (typically `Content-Type`
           matching `fileType`). The URL is valid for `expiresIn` seconds.
        3. `POST /assets/{assetId}/confirm` — confirm the upload is complete so the
           backend can verify the object and mark the asset `confirmed`.

        Once confirmed, reference the asset by `assetId` elsewhere in the API
        (e.g. `SetAssetIdRequest` for `PUT /users/{userId}/avatar`,
        `PUT /organizations/{orgId}/avatar`, `PUT /teams/{teamId}/avatar`, or as
        entries in `assetIds` on `CreatePostRequest`).

        Requires an adult or consented-minor user.
      tags:
        - Assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetUploadRequest"
      responses:
        "201":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/assets/{assetId}/confirm:
    post:
      operationId: confirmUpload
      summary: Confirm an asset upload after file is in S3
      tags:
        - Assets
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Asset confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/assets/{assetId}:
    get:
      operationId: getAsset
      summary: Get asset by ID
      tags:
        - Assets
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Asset details with signed download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteAsset
      summary: Soft-delete an asset
      tags:
        - Assets
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "204":
          description: Asset deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/organizations/{orgId}/members/{userId}:
    patch:
      operationId: updateMemberRole
      summary: Update a member's role in an organization
      tags:
        - Members
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/MemberUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleRequest"
      responses:
        "200":
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: removeMember
      summary: Remove a member from an organization
      tags:
        - Members
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/MemberUserId"
      responses:
        "204":
          description: Member removed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
