      type: object
      additionalProperties: false
      description: |
        The user who triggered the underlying event (tagger, commenter, message sender). `null` for items that are not attributable to a single user (e.g. a generic notification or a roster status change).
      required:
        - id
        - displayName
        - avatarUrl
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          example: Coach Davis
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://images.unsplash.com/photo-1633332755192-727a05c4013d?w=400&h=400&fit=crop&crop=faces
    ChildNotificationKind:
      type: string
      description: |
        Source of the aggregated item. The `itemKey` always begins with this kind followed by a colon and the underlying row's id. `authoredArticle` and `authoredHighlight` represent posts authored / uploaded by the child themselves; Remove on those hides the underlying article / highlight (`hiddenAt = now()`) so it disappears from every public surface.
      enum:
        - notification
        - tag
        - comment
        - message
        - roster
        - authoredArticle
        - authoredHighlight
    ChildNotificationDecision:
      type: string
      description: |
        Parent's verdict on the item. `approved` records that the parent has reviewed and is fine with the activity; `removed` additionally performs the kind-specific destructive action (decline tag, hide comment/message, decline roster, etc.).
      enum:
        - approved
        - removed
    ChildNotificationItem:
      type: object
      additionalProperties: false
      required:
        - itemKey
        - kind
        - title
        - body
        - link
        - isRead
        - decision
        - createdAt
        - actor
      properties:
        itemKey:
          type: string
          description: |
            Stable key in the form `<kind>:<id>` (e.g. `tag:abc-123`). Used as the identifier when marking the item read.
        kind:
          $ref: "#/components/schemas/ChildNotificationKind"
        title:
          type: string
          example: "Player profile: rising star at WR"
        body:
          type: string
          nullable: true
          example: Highlight reel from Friday's matchup is up — go check it out.
        link:
          type: string
          nullable: true
          description: |
            App-relative path the parent should land on when activating the item, or `null` when there is no useful destination.
        isRead:
          type: boolean
          description: |
            Whether the parent has already marked this item as seen for this child. Tracked separately from the child's own read state.
        decision:
          $ref: "#/components/schemas/ChildNotificationDecision"
          nullable: true
          description: |
            The parent's recorded decision for this item, or `null` if no decision has been made yet. Items with a non-null decision drop out of the default feed on the next fetch.
        createdAt:
          type: string
          format: date-time
        actor:
          $ref: "#/components/schemas/ChildNotificationActor"
          nullable: true
    ChildNotificationStreamResponse:
