          description: Invite accepted for the child.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/posts/{postId}/co-authors:
    get:
      operationId: listPostCoAuthors
      summary: List co-authors of a post
      tags:
        - Posts
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Co-author list.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: addPostCoAuthor
      summary: Add a co-author to a post
      tags:
        - Posts
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Co-author added.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/posts/{postId}/co-authors/{userId}:
    delete:
      operationId: removePostCoAuthor
      summary: Remove a co-author from a post
      tags:
        - Posts
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Co-author removed.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/posts/{postId}/publish:
    post:
      operationId: publishPost
      summary: Publish a draft post
      tags:
        - Posts
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Published post.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/assets/{assetId}/data:
    put:
      operationId: putAssetData
      summary: Internal asset-upload completion endpoint
      description: |
        **Internal**. Used by the upload pipeline to mark an asset
        upload as complete and store the binary payload reference.
        Not intended for direct client use.
      tags:
        - Assets
      parameters:
        - $ref: "#/components/parameters/AssetId"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Asset data accepted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: Payload too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    UserSearchResult:
      type: object
      required:
        - id
        - displayName
        - avatarUrl
        - type
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          example: Marcus Rivera
        avatarUrl:
          type: string
          nullable: true
          example: https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=400&h=400&fit=crop&crop=faces
        type:
          type: string
          enum:
            - user
    PublicUserResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - isOwnProfile
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
          example: Tyler
        lastName:
          type: string
          example: Davis
        bio:
          type: string
          nullable: true
          maxLength: 1000
          example: Speed, hands, and vision. Dedicated to outworking the competition.
        website:
          type: string
          nullable: true
          description: |
            Personal website / link surfaced on the public profile.
            Always a full `https://…` URL when set; bare domains submitted
            via `UpdateUserRequest` are normalized server-side before
            being stored. Null when the user has not set one.
          example: https://westfield-warriors.example.com
        city:
          type: string
          nullable: true
          description: |
            Optional free-text city the user is based in (task #349).
            Surfaced on the profile alongside `state`. Null when not set.
          example: Riverside
        state:
          type: string
          nullable: true
          description: |
            Optional two-letter US state postal code (50 states + DC) the
            user is based in (task #349). Mirrors the same enum used by
            organizations. Null when not set.
          example: NJ
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&h=400&fit=crop&crop=faces
        coverPhotoUrl:
          type: string
          format: uri
          nullable: true
          description: Presigned S3 URL for the user's cover photo. Null if not set or suppressed for COPPA compliance.
          example: https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=1600&h=600&fit=crop
        isOwnProfile:
          type: boolean
        isFollowing:
          type: boolean
        isConnection:
          type: boolean
        followerCount:
          type: integer
          minimum: 0
        followingCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TokenRefreshResponse:
      type: object
      required:
        - tokenType
        - accessToken
        - expiresIn
        - accessTokenExpiresAt
        - refreshToken
        - refreshTokenExpiresAt
      properties:
        tokenType:
          type: string
          enum:
            - Bearer
          description: |
            Always `Bearer`. Send the access token as
            `Authorization: Bearer <accessToken>`.
        accessToken:
          type: string
          description: Short-lived (~15 min) HMAC-signed access token.
        expiresIn:
          type: integer
          description: Seconds until `accessToken` expires.
        accessTokenExpiresAt:
          type: string
          format: date-time
          description: Absolute expiry of `accessToken`.
        refreshToken:
          type: string
          description: |
            Long-lived refresh token. Single-use — rotated on every call
            to `/auth/refresh`. Replace your stored copy with the new one
            on each refresh.
        refreshTokenExpiresAt:
          type: string
          format: date-time
          description: Absolute expiry of `refreshToken` (30 days from issue).
    TokenIssueResponse:
      allOf:
        - $ref: "#/components/schemas/TokenRefreshResponse"
        - type: object
          required:
            - user
          properties:
            user:
              $ref: "#/components/schemas/PrivateUserResponse"
    PrivateUserResponse:
      allOf:
        - $ref: "#/components/schemas/PublicUserResponse"
        - type: object
          required:
            - email
            - role
          properties:
            email:
              type: string
              format: email
              example: coach@kinectem.demo
            dateOfBirth:
              type: string
              format: date
              nullable: true
            role:
              type: string
              enum:
                - athlete
                - coach
                - admin
                - parent
              description: The caller's account role. Used by the client to gate role-specific UI (e.g. the Family/Guardian page).
            isMinor:
              type: boolean
              description: |
                Task #359 — true when the account belongs to a user
                under 13. The client uses this to hide UI surfaces (DM,
                comments, follow, profile PII fields) the server also
                blocks. Snapshot at signup; never recomputed.
            accountStatus:
              type: string
              enum:
                - active
                - pending_guardian
                - disabled
              description: |
                Task #359 — gates sign-in. `pending_guardian` means
                COPPA verifiable parental consent has not been finalized;
                `disabled` means a guardian has revoked consent.
            parentId:
              type: string
              format: uuid
              nullable: true
              description: |
                The user's linked parent/guardian account ID, if any. Exposed so a viewer can detect they are this user's linked parent (used to show the Edit Profile button on a child's profile). Null for users without a linked parent.
    UpdateUserRequest:
      type: object
      additionalProperties: false
      properties:
        firstName:
          type: string
          maxLength: 100
          example: Riley
        lastName:
          type: string
          maxLength: 100
          example: Carter
        dateOfBirth:
          type: string
          format: date
          description: ISO 8601 date (YYYY-MM-DD).
        bio:
          type: string
          nullable: true
          maxLength: 1000
          example: Three-sport athlete with a love for the game and the grind.
        website:
          type: string
          nullable: true
          description: |
            Personal website / link. Bare domains like `example.com` are
            accepted and normalized to a full `https://…` URL by the
            server before being stored. An empty string or null clears
            the field. Non-http(s) URLs and obvious garbage are rejected
            with a 400.
          example: https://kinectem.demo
        city:
          type: string
          nullable: true
          maxLength: 100
          description: |
            Optional free-text city the user is based in (task #349).
            An empty string or null clears the field.
          example: Westfield
        state:
          type: string
          nullable: true
          description: |
            Optional two-letter US state postal code (50 states + DC) the
            user is based in (task #349). An empty string or null clears
            the field.
          enum:
            - AL
            - AK
            - AZ
            - AR
            - CA
            - CO
            - CT
            - DE
            - DC
            - FL
            - GA
            - HI
            - ID
            - IL
            - IN
            - IA
            - KS
            - KY
            - LA
            - ME
            - MD
            - MA
            - MI
            - MN
            - MS
            - MO
            - MT
            - NE
            - NV
            - NH
            - NJ
            - NM
            - NY
            - NC
            - ND
            - OH
            - OK
            - OR
            - PA
            - RI
            - SC
            - SD
            - TN
            - TX
            - UT
            - VT
            - VA
            - WA
            - WV
            - WI
            - WY
        level:
          type: string
          nullable: true
          maxLength: 50
          example: U18
        avatarUrl:
          type: string
          nullable: true
          description: |
            URL of the user's profile picture. Must reference a confirmed
            asset previously uploaded by the caller via the upload + confirm
            flow, or null to remove the current avatar. The server enforces
            ownership and confirmation, so arbitrary external URLs are
            rejected with 400. No fixed maxLength is set because uploaded
            assets are stored as base64 `data:` URLs that can be many MB
            long; the server caps the length to match the asset upload
            size limit.
          example: https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=400&h=400&fit=crop&crop=faces
    SetAssetIdRequest:
      type: object
      required:
        - assetId
      additionalProperties: false
      properties:
        assetId:
          type: string
          format: uuid
          description: UUID of a confirmed asset owned by the caller.
    UpdateUserSportsRequest:
      type: object
