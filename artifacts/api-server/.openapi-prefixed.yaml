      type: object
      required:
        - id
        - deleted
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        deleted:
          type: boolean
          enum:
            - true
          description: Always true. Discriminator field distinguishing a deleted stub from a full MessageResponse.
        createdAt:
          type: string
          format: date-time

