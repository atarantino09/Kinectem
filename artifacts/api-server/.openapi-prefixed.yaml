  responses:
    BadRequest:
      description: Validation error — malformed body, invalid params, or constraint violation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: No valid authentication session
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not authorized for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Request payload is syntactically valid but semantically incorrect
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists (e.g., duplicate slug)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unhandled server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: kinectem_session
      description: |
        Server-issued session token, stored as an `HttpOnly` cookie named
        `kinectem_session`. Set by `POST /auth/login` and `POST /auth/signup`,
        cleared by `POST /auth/logout`. Sessions live for 30 days.

        Browsers send this cookie automatically; `fetch` callers must use
        `credentials: "include"`.
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        **Planned, not yet implemented.** Long-lived API key for
        server-to-server integrations. Listed here so that clients can
        anticipate the future shape; the server currently rejects this
        header with `401`.
