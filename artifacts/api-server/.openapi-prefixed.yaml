        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Co-author removed.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/posts/{postId}/publish:
    post:
      operationId: publishPost
      summary: Publish a draft post
      tags:
        - Posts
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Published post.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/assets/{assetId}/data:
    put:
      operationId: putAssetData
      summary: Internal asset-upload completion endpoint
      description: |
        **Internal**. Used by the upload pipeline to mark an asset
        upload as complete and store the binary payload reference.
        Not intended for direct client use.
      tags:
        - Assets
      parameters:
        - $ref: "#/components/parameters/AssetId"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Asset data accepted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: Payload too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    UserSearchResult:
      type: object
      required:
        - id
        - displayName
        - avatarUrl
        - type
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          example: Marcus Rivera
        avatarUrl:
          type: string
          nullable: true
          example: https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=400&h=400&fit=crop&crop=faces
        type:
          type: string
          enum:
            - user
    PublicUserResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - isOwnProfile
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
          example: Tyler
        lastName:
          type: string
          example: Davis
        nickname:
          type: string
          nullable: true
          maxLength: 100
          example: Lightning
        bio:
          type: string
          nullable: true
          maxLength: 1000
          example: Three-sport athlete with a love for the game and the grind.
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://images.unsplash.com/photo-1607746882042-944635dfe10e?w=400&h=400&fit=crop&crop=faces
        coverPhotoUrl:
          type: string
          format: uri
          nullable: true
          description: Presigned S3 URL for the user's cover photo. Null if not set or suppressed for COPPA compliance.
          example: https://images.unsplash.com/photo-1577223625816-7546f13df25d?w=1600&h=600&fit=crop
        isOwnProfile:
          type: boolean
        isFollowing:
          type: boolean
        isConnection:
          type: boolean
        followerCount:
          type: integer
          minimum: 0
        followingCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PrivateUserResponse:
      allOf:
        - $ref: "#/components/schemas/PublicUserResponse"
        - type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
              example: marcus@kinectem.demo
            dateOfBirth:
              type: string
              format: date
              nullable: true
    UpdateUserRequest:
      type: object
      additionalProperties: false
      properties:
        firstName:
          type: string
          maxLength: 100
          example: Devon
        lastName:
          type: string
          maxLength: 100
          example: Reed
        dateOfBirth:
          type: string
          format: date
          description: ISO 8601 date (YYYY-MM-DD).
        bio:
          type: string
          nullable: true
          maxLength: 1000
          example: Class of 2026. Future is bright. Stay locked in.
        nickname:
          type: string
          nullable: true
          maxLength: 100
          example: Lightning
        level:
          type: string
          nullable: true
          maxLength: 50
          example: JV
        avatarUrl:
          type: string
          nullable: true
          maxLength: 4096
          description: URL of the user's profile picture. Use the asset upload flow to obtain a confirmed URL, or pass null to remove the current avatar.
          example: https://images.unsplash.com/photo-1607746882042-944635dfe10e?w=400&h=400&fit=crop&crop=faces
    SetAssetIdRequest:
      type: object
      required:
        - assetId
      additionalProperties: false
      properties:
        assetId:
          type: string
          format: uuid
          description: UUID of a confirmed asset owned by the caller.
    UpdateUserSportsRequest:
      type: object
      required:
        - sports
      additionalProperties: false
      properties:
        sports:
          type: array
          maxItems: 5
          items:
            type: string
    UserSportsResponse:
      type: object
      required:
        - sports
      properties:
        sports:
          type: array
          items:
            type: string
    UserSettingsResponse:
      type: object
      additionalProperties: true
      description: Free-form settings bag. Known keys below; clients may receive additional keys in the future.
      properties:
        share_to_facebook_default:
          type: boolean
    UpdateUserSettingsRequest:
      type: object
      additionalProperties: false
      description: Strict — unknown keys rejected with 400.
      properties:
        share_to_facebook_default:
          type: boolean
    UserTeamMembershipResponse:
      type: object
      required:
        - id
        - teamId
        - teamName
        - teamSlug
        - organization
        - role
        - position
        - status
        - seasonId
        - joinedAt
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        teamName:
          type: string
        teamSlug:
          type: string
        teamAvatarUrl:
          type: string
          format: uri
          nullable: true
        organization:
          $ref: "#/components/schemas/TeamOrganizationEmbed"
        role:
          type: string
          enum:
            - owner
            - admin
            - author
            - member
        position:
          type: string
          enum:
            - player
            - coach
            - assistant_coach
            - manager
            - parent
            - author
        status:
          type: string
          enum:
            - pending
            - active
        seasonId:
          type: string
          format: uuid
        seasonName:
          type: string
          nullable: true
        joinedAt:
          type: string
          format: date-time
    PaginatedUserTeamMembershipsResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
