            schema:
              $ref: "#/components/schemas/MarkChildNotificationReadRequest"
      responses:
        "204":
          description: Item marked as read.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/users/me/children/{childId}/notifications/read-all:
    post:
      operationId: markAllChildNotificationsRead
      summary: Mark every currently visible child-stream item as read
      tags:
