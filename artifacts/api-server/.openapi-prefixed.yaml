openapi: 3.0.3
info:
  title: Kinectem API
  version: 0.1.0
  description: Youth sports recruiting platform API

servers:
  - url: /api/v1
    description: Versioned API base path

# All endpoints require Clerk session authentication.
# Auth is enforced by clerkMiddleware + requireAuth before the validator runs.
security:
  - clerkSession: []

paths:
  /api/v1/users:
    get:
      operationId: searchUsers
      summary: Search users by name
      tags: [Users]
      security:
        - clerkSession: []
      parameters:
        - name: search
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSearchResult'
        '400':
          description: Missing or too-short search parameter
        '401':
          description: Authentication required
        '429':
          description: Rate limited

  /api/v1/users/{userId}:
    get:
      operationId: getUserById
      summary: Get user profile
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                # NOTE: PrivateUserResponse extends PublicUserResponse via allOf,
                # so every valid Private response also matches Public. This makes
                # the oneOf technically ambiguous under OAS 3.0 semantics. This is
                # safe because validateResponses is disabled (see app.ts). If
                # response validation is ever enabled, add a discriminator or
                # restructure schemas. See BACKLOG P3-11.
                oneOf:
                  - $ref: '#/components/schemas/PrivateUserResponse'
                  - $ref: '#/components/schemas/PublicUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateUser
      summary: Update user profile (self only)
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/{userId}/cover-photo:
    put:
      operationId: setUserCoverPhoto
      summary: Set user cover photo
      description: Sets the user's cover photo to a confirmed image asset they own.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - assetId
              properties:
                assetId:
                  type: string
                  format: uuid
                  description: ID of a confirmed image asset owned by the user.
      responses:
        '200':
          description: Cover photo set successfully. Returns updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserResponse'
        '400':
          description: Asset is not an image type.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Asset not found or not confirmed.
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteUserCoverPhoto
      summary: Remove user cover photo
      description: Removes the user's cover photo. Returns the updated profile with coverPhotoUrl set to null. Returning 200 with the full profile (rather than 204) is deliberate — it gives the client an updated profile snapshot without a follow-up GET.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Cover photo removed. Returns updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/{userId}/organizations:
    get:
      operationId: listUserOrganizations
      summary: List organizations the user belongs to
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeTotal'
      responses:
        '200':
          description: Paginated list of organizations the user belongs to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/organizations:
    post:
      operationId: createOrganization
      summary: Create a new organization
      tags:
        - Organizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: listOrganizations
      summary: List and search organizations
      tags:
        - Organizations
      parameters:
        - name: slug
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 2
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeTotal'
      responses:
        '200':
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/organizations/{orgId}:
    get:
      operationId: getOrganizationById
      summary: Get organization by ID
      tags:
        - Organizations
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateOrganization
      summary: Update organization details
      tags:
        - Organizations
      parameters:
        - $ref: '#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteOrganization
      summary: Delete organization (not yet supported)
      tags:
        - Organizations
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '403':
          description: >-
            Organization deletion is not yet supported (DELETE_NOT_SUPPORTED),
            or the requester is not authorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/organizations/{orgId}/follow:
    post:
      operationId: followOrg
      summary: Follow an organization
      tags:
        - Follows
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '201':
          description: Follow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowOrgResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: unfollowOrg
      summary: Unfollow an organization
      tags:
        - Follows
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '204':
          description: Unfollowed (idempotent)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/organizations/{orgId}/followers:
    get:
      operationId: listOrgFollowers
      summary: List followers of an organization
      tags:
        - Follows
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/FollowLimit'
      responses:
        '200':
          description: Paginated list of followers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFollowersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/organizations/{orgId}/members:
    get:
      operationId: listMembers
      summary: List members of an organization
      tags:
        - Members
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeTotal'
      responses:
        '200':
          description: Paginated list of organization members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMembersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: addMember
      summary: Add a member to an organization
      tags:
        - Members
      parameters:
        - $ref: '#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/assets/upload:
    post:
      operationId: requestUpload
      summary: Request a presigned URL for asset upload
      tags:
        - Assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUploadRequest'
      responses:
        '201':
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/assets/{assetId}/confirm:
    post:
      operationId: confirmUpload
      summary: Confirm an asset upload after file is in S3
      tags:
        - Assets
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/assets/{assetId}:
    get:
      operationId: getAsset
      summary: Get asset by ID
      tags:
        - Assets
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset details with signed download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteAsset
      summary: Soft-delete an asset
      tags:
        - Assets
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '204':
          description: Asset deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/organizations/{orgId}/members/{userId}:
    patch:
      operationId: updateMemberRole
      summary: Update a member's role in an organization
      tags:
        - Members
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/MemberUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRoleRequest'
      responses:
        '200':
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: removeMember
      summary: Remove a member from an organization
      tags:
        - Members
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/MemberUserId'
      responses:
        '204':
          description: Member removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/posts:
    post:
      operationId: createPost
      summary: Create a new post
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/posts/{postId}:
    get:
      operationId: getPost
      summary: Get a post by ID
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Post details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updatePost
      summary: Update a post
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostRequest'
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deletePost
      summary: Soft-delete a post
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '204':
          description: Post deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/posts/{postId}/revisions:
    get:
      operationId: getPostRevisions
      summary: List edit history for a post
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Revision history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostRevisionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/organizations/{orgId}/posts:
    get:
      operationId: listOrgPosts
      summary: List posts for an organization
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/IncludeTotal'
      responses:
        '200':
          description: Paginated list of organization posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/{userId}/follow:
    post:
      operationId: followUser
      summary: Follow a user
      tags:
        - Follows
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '201':
          description: Follow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: unfollowUser
      summary: Unfollow a user
      tags:
        - Follows
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Unfollowed (idempotent)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/{userId}/followers:
    get:
      operationId: listUserFollowers
      summary: List followers of a user
      tags:
        - Follows
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/FollowLimit'
      responses:
        '200':
          description: Paginated list of followers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFollowersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/{userId}/following:
    get:
      operationId: listUserFollowing
      summary: List users and organizations a user follows
      tags:
        - Follows
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/FollowLimit'
      responses:
        '200':
          description: Paginated list of followed entities (users and organizations)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFollowingResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/{userId}/block:
    post:
      operationId: blockUser
      summary: Block a user
      tags:
        - Blocks
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '201':
          description: Block created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: unblockUser
      summary: Unblock a user
      tags:
        - Blocks
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Unblocked (idempotent)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/{userId}/privacy:
    get:
      operationId: getUserPrivacy
      summary: Get user privacy settings (self only)
      tags:
        - Privacy
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User privacy settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPrivacySettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateUserPrivacy
      summary: Update user privacy settings (self only)
      tags:
        - Privacy
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
