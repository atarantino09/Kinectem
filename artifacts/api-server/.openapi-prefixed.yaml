      summary: Get the currently authenticated session including masquerade state
      tags:
        - Auth
      responses:
        "200":
          description: Session details. When `authenticated` is false the other fields are omitted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - authenticated
                properties:
                  authenticated:
                    type: boolean
                  isMasquerading:
                    type: boolean
                  realUser:
                    $ref: "#/components/schemas/AdminWhoamiUser"
                  viewingAs:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/AdminWhoamiUser"
                  canAuthorRecap:
                    type: boolean
                    description: True when the (effective) session user can author a Game Recap on at least one team — i.e. they are an org admin of any organization, OR have an accepted roster entry as a coach, OR have an accepted roster entry with the explicit "author" position.
                additionalProperties: true
