        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/guardian-resend-by-email:
    post:
      operationId: authGuardianResendByEmail
      summary: Parent-driven recovery — resend a guardian-confirmation email
      description: |
        Parent-facing recovery for an expired, used, or otherwise dead
        guardian-confirmation link. Looks up the under-13 athlete by the
        guardian email on file and, if found, mints a fresh confirmation
        token and re-sends the email. Always responds with the same
        generic 200 to avoid leaking which guardian emails exist.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - guardianEmail
              properties:
                guardianEmail:
                  type: string
                  format: email
      responses:
        "200":
          description: Generic acknowledgement (sent whether or not an account exists).
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - message
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    example: Awesome game today. Proud of the effort.
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/api-keys:
    get:
      operationId: listApiKeys
      summary: List the calling user's API keys
      description: |
        Returns every API key (active and revoked) owned by the
        authenticated user. The plaintext token is **never** returned —
        only the short `prefix` is surfaced so the dev portal can render
        a recognizable fingerprint. Sorted with active keys first, then
        revoked keys, each group ordered by creation time ascending.
      tags:
        - Auth
      responses:
        "200":
          description: List of API keys owned by the calling user.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createApiKey
      summary: Create a new API key
      description: |
        Issues a fresh long-lived API key on behalf of the authenticated
        user. The plaintext `token` is included in the response **exactly
        once** and is never recoverable afterward — clients must surface
        it immediately and store it somewhere safe.

        Each user may hold up to 25 active (non-revoked) keys at a time;
        creating beyond that returns `409 CONFLICT`.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 80
                  description: Human label so the owner can tell keys apart later.
                  example: Cardinal Track & Field
                scopes:
                  type: array
                  description: |
                    Optional scope labels (`read`, `write`). The current
                    server treats every non-revoked key as full-access on
                    the owner's behalf; the array is stored so future
                    scope-aware authorization has labels to enforce.
                  items:
                    type: string
                    enum:
                      - read
                      - write
      responses:
        "201":
          description: API key created. The plaintext `token` is shown only here.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyWithToken"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/auth/api-keys/{id}:
    delete:
      operationId: revokeApiKey
      summary: Revoke an API key
      description: |
        Marks the API key as revoked. Subsequent requests presenting the
        revoked key are treated as unauthenticated. Already-revoked keys
        are a no-op (still `204`). Users can only revoke keys they own;
        another user's id returns `404`.
      tags:
        - Auth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Key revoked (or was already revoked).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
