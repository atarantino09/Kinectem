        - unreadCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - direct
            - user_to_org
            - org_to_org
        participant:
          $ref: '#/components/schemas/ConversationParticipant'
        lastMessage:
          $ref: '#/components/schemas/ConversationLastMessage'
        unreadCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageAsset:
      type: object
      required:
        - id
        - fileName
        - mimeType
        - size
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
          nullable: true
          description: Time-limited signed S3 URL. Null if the asset upload has not yet been confirmed.

    MessageResponse:
      type: object
      required:
        - id
        - senderId
        - senderDisplayName
        - assets
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        senderDisplayName:
          type: string
        senderAvatarUrl:
          type: string
          format: uri
          nullable: true
        body:
          type: string
          nullable: true
        assets:
          type: array
          items:
            $ref: '#/components/schemas/MessageAsset'
        createdAt:
          type: string
          format: date-time

