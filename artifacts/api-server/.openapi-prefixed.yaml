    CreatePostRequest:
      type: object
      required:
        - postType
      properties:
        postType:
          type: string
          enum:
            - short
            - long
        title:
          type: string
          maxLength: 200
          example: "Player profile: rising star at WR"
        description:
          type: string
          maxLength: 50000
          example: Youth athletic organization developing the next generation of athletes.
        body:
          type: string
          maxLength: 50000
          example: Thanks to all the families who came out to support us.
        organizationId:
          type: string
          format: uuid
        assetIds:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 10
        gameDate:
          type: string
          format: date-time
          nullable: true
          description: |
            For long-form posts only. When set, the article is treated
            as a game recap and every accepted player on the team's
            roster is auto-tagged. Tags default to status `approved`,
            but become `pending` when either the player or their parent
            has `requireTagConsent` enabled (the existing pending-tags
            consent model).
        opponentName:
          type: string
          maxLength: 200
          nullable: true
          description: For long-form game recaps. Free-form opponent name displayed on the article.
        gameScore:
          type: string
          maxLength: 20
          nullable: true
          description: |
            For long-form game recaps. Format `"<team>-<opponent>"`,
            e.g. `"34-14"`. Other formats are silently ignored.
        taggedUserIds:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 50
          description: |
            Optional explicit tag list for long-form posts. Always
            inserted as `approved`, then merged with the auto-tag fan-out
            (deduped by user; pending wins over approved).
    CreateOrgPostRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          maxLength: 200
          example: Saturday's win secures playoff spot
        body:
          type: string
          maxLength: 50000
          example: Practice was a grind today. The work is paying off.
        photoUrls:
          type: array
          items:
            type: string
          maxItems: 10
        videoUrl:
          type: string
          nullable: true
    UpdatePostRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
          nullable: true
          example: "Player profile: rising star at WR"
        description:
          type: string
          maxLength: 50000
          nullable: true
          description: |
            Caption / summary text. For highlights this maps to the
            short-form description; for game-recap articles it maps
            to the article summary. Ignored for org posts (use `body`).
          example: Building character, work ethic, and a love for the sport.
        body:
          type: string
          maxLength: 50000
          nullable: true
          example: Thanks to all the families who came out to support us.
        assetIds:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 10
        photoUrls:
          type: array
          items:
            type: string
          maxItems: 10
          description: |
            Inline photo URLs (data: URLs or remote links). Used for
            game-recap articles and Updates (org posts). Ignored for
            highlights. Capped at 10 to mirror the create endpoints.
        videoUrl:
          type: string
          nullable: true
          description: |
            External video link (e.g. YouTube). Editable on every
            post kind. Pass null or empty to clear.
        coverImageUrl:
          type: string
          nullable: true
          description: |
            Article / org post cover image URL. Defaults to
            `photoUrls[0]` when `photoUrls` is provided and this
            field isn't.
        thumbnailUrl:
          type: string
          nullable: true
          description: |
            Highlight thumbnail URL. Only meaningful when editing a
            highlight; ignored for other post kinds.
          example: https://images.unsplash.com/photo-1546519638-68e109498ffc?w=1200&h=800&fit=crop
        gameDate:
          type: string
          format: date-time
          nullable: true
          description: |
            For long-form posts. Pass an ISO datetime to mark the
            article as a game recap (or update the recap's date);
            pass `null` to clear it.

            Drafts: the auto-tag fan-out fires at publish time, not
            on PATCH. Already-published recaps react to the
            transition immediately — adding a `gameDate` tags every
            rostered player (idempotent: existing tags are
            preserved); clearing a `gameDate` removes only the
            roster tags the fan-out itself created. Manual tags
            (explicit @-mentions, or rows somebody approved/declined
            through the consent flow) are always left alone.
    PostAuthor:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          example: Marcus Rivera
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=400&h=400&fit=crop&crop=faces
        authorRole:
          type: string
          nullable: true
          enum:
            - Coach
            - Author
            - Owner
            - Admin
            - null
          description: |
            The strongest team-relevant role that authorizes this user
            to author the post on the post's team, resolved at read
            time. Priority: team coach → "Coach", roster "author"
            position → "Author", organization owner → "Owner",
            organization admin → "Admin". Only article-backed
            (long-form) posts populate this; short-form (highlight)
            and org posts always omit it / send null. Null when the
            author no longer holds any of those roles.
    PostTaggedUser:
      type: object
      required:
        - id
        - displayName
        - tagStatus
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          example: Tyler Chen
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=400&fit=crop&crop=faces
        tagStatus:
          type: string
          enum:
            - approved
            - pending
          description: |
            `approved` for fully-consented tags shown to everyone.
            `pending` is only included for the post author and the
            tagged player themselves; other viewers never see
            pending entries in this list.
    CurrentUserTag:
      type: object
      required:
        - id
        - kind
        - status
      description: |
        The requesting viewer's own tag on this post, when one
        exists with status `approved` or `pending`. Drives the
        "Remove me from this post" affordance in the post 3-dot
        menu so a tagged user can untag themselves without going
        to the Manage Tags page. Null / omitted when the viewer
        is not tagged on the post, or their tag was already
        declined / removed. Org-post (Update) cards never set
        this since they have no tag concept.
      properties:
        id:
          type: string
          format: uuid
          description: |
            The `article_tags.id` or `highlight_tags.id` row the
            viewer can DELETE through `/article-tags/:id` or
            `/highlight-tags/:id` to remove themselves.
        kind:
          type: string
          enum:
            - article
            - highlight
          description: |
            Which tag table the row lives in — chooses between
            the article-tags and highlight-tags DELETE endpoints.
        status:
          type: string
          enum:
            - approved
            - pending
          description: |
            Status of the viewer's own tag row. Declined and
            removed tags are never surfaced; the field is null
            instead.
    PostContext:
      type: object
      required:
        - type
        - id
      properties:
        type:
          type: string
          enum:
            - user
            - organization
            - team
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
          example: Westfield Warriors
        slug:
          type: string
          nullable: true
          description: URL slug for org or team contexts; omitted for user context.
          example: riverside-soccer
        orgSlug:
          type: string
          nullable: true
          description: Parent org slug for team contexts only.
        orgId:
          type: string
          format: uuid
          nullable: true
          description: Parent org id for team contexts only; enables linking to the org page.
        orgName:
          type: string
          nullable: true
          description: Parent org display name for team contexts only.
        avatarUrl:
          type: string
          format: uri
          nullable: true
          description: Signed S3 URL resolved at read time for org/team avatars.
          example: https://images.unsplash.com/photo-1607746882042-944635dfe10e?w=400&h=400&fit=crop&crop=faces
        orgAvatarUrl:
          type: string
          format: uri
          nullable: true
          description: |
            Parent organization's logo URL for team contexts only. Populated so post cards can show the org logo next to the team name when the team itself has no logo set. Null for non-team contexts and when the parent org also has no logo.
    PostAssetResponse:
      type: object
      required:
        - id
        - fileType
        - displayOrder
      properties:
        id:
          type: string
          format: uuid
        fileType:
          type: string
        url:
          type: string
          format: uri
          nullable: true
          example: https://images.unsplash.com/photo-1574680096145-d05b474e2155?w=1200&h=800&fit=crop
        displayOrder:
          type: integer
    PostResponse:
      type: object
      required:
        - id
        - postType
        - author
        - context
        - assets
        - isEdited
        - reactionCount
        - hasReacted
        - commentCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        postType:
          type: string
          enum:
            - short
            - long
        title:
          type: string
          nullable: true
          example: Coach's notes from the championship
        description:
          type: string
          nullable: true
          example: Building character, work ethic, and a love for the sport.
        body:
          type: string
          nullable: true
          example: Practice was a grind today. The work is paying off.
        author:
          $ref: "#/components/schemas/PostAuthor"
        context:
          $ref: "#/components/schemas/PostContext"
        assets:
          type: array
          items:
            $ref: "#/components/schemas/PostAssetResponse"
        isEdited:
          type: boolean
        reactionCount:
          type: integer
          minimum: 0
        hasReacted:
          type: boolean
        commentCount:
          type: integer
          minimum: 0
        recentReactorName:
          type: string
          nullable: true
          description: Display name of the most recent reactor (if any), for "X and N others reacted" UI hints.
        shareCount:
          type: integer
          minimum: 0
          description: |
            Number of times this post has been re-shared. Per task
            #190 game-recap articles and highlights are both
            shareable; org posts are not, so they always report 0.
        hasShared:
          type: boolean
          description: |
            True when the requesting user has re-shared this post.
            Always false for org posts (not a shareable kind).
        sharedBy:
          nullable: true
          description: |
            Set when this card represents a re-share (e.g. on the
            sharer's profile Posts tab or in the home feed of someone
            following the sharer). Identifies who re-published the
            recap or highlight. The original `author` and `context`
            fields still describe the original post.
          allOf:
            - $ref: "#/components/schemas/PostAuthor"
        sharedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            ISO datetime the share was created. Only set when
            `sharedBy` is set; clients sort shared cards by this
            timestamp so a recently-shared old post rises to the
            top of the sharer's profile feed.
        gameDate:
          type: string
          format: date-time
          nullable: true
          description: |
            For long-form posts only. ISO datetime when the recap's
            game was played, or `null` for a regular long-form post.
            Clients use this both as the "is this a recap?" signal
            and to pre-fill the Game Date input when reopening a
            saved draft.
        canEdit:
          type: boolean
          description: |
            True when the requesting user is the author, a co-author,
            or an org admin of the team that owns the post — i.e.
            allowed to PATCH this post. Computed on the `getPost`
            (detail) endpoint and on every list endpoint that returns
            posts (feed, team posts, profile posts, org posts) so the
            client can render the Edit affordance inline. Always
            `false` for non-article post types (highlights, org
            posts) since the composer only edits articles.
        canDelete:
          type: boolean
          description: |
            True when the requesting user is the original author of
            this post — and only the original author. Co-authors,
            team coaches, and org admins (who can still PATCH the
            post via `canEdit`) are NOT allowed to delete it, so
            `canDelete` will be false for them. Drives the "Delete
            post" item in the post 3-dot menu. Always `false` for
            non-article post types since the composer only deletes
            articles.
        tagStatus:
          type: string
          enum:
            - approved
            - pending
          nullable: true
          description: |
            Only set on `listUserPosts` results, and only when the
            article was surfaced via the user's own `article_tags` row
            and the tag is still `pending`. Clients should render a
            small "Pending tag" affordance for these posts. Authored
            posts and approved tags omit this field.
        taggedUsers:
          type: array
          description: |
            People tagged on this post that the requesting viewer is
            allowed to see. Approved tags are visible to everyone;
            pending tags are only included for the post author and
            the tagged player themselves (mirroring the recap
            consent rules). Currently populated only for highlight
            posts; other post kinds omit this field. The list is
            stable per highlight in the order tags were created.
          items:
            $ref: "#/components/schemas/PostTaggedUser"
        currentUserTag:
          nullable: true
          description: |
            The requesting viewer's own tag on this post, when one
            exists with status approved or pending. Used to render
            the "Remove me from this post" 3-dot menu item. Null
            for guests, for users who aren't tagged, for declined /
            removed tags, and for org_post cards (which have no
            tag concept).
          allOf:
            - $ref: "#/components/schemas/CurrentUserTag"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PostRevisionEditor:
      type: object
      required:
