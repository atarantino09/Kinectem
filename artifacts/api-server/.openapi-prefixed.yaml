        editedBy:
          $ref: "#/components/schemas/PostRevisionEditor"
        createdAt:
          type: string
          format: date-time
    CreateConsentRequest:
      type: object
      required:
        - parentEmail
      additionalProperties: false
      properties:
        parentEmail:
          type: string
          format: email
          maxLength: 255
          description: Parent or guardian email address for consent verification.
    ConsentRequestResponse:
      type: object
      required:
        - id
        - childUserId
        - status
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        childUserId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending
            - confirmed
            - expired
            - revoked
        expiresAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    NotificationResponse:
      type: object
      required:
        - id
        - type
        - title
        - isRead
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: |
            Open-ended notification type. Known values today include `roster_invite`, `post_reaction`, `comment`, `follow`, `guardian_invite`, `consent_granted`, `consent_revoked`, plus moderation events. Treat unknown values as "generic notification" — new types may be added without a spec bump.
        title:
          type: string
          example: "Senior night recap: a perfect ending"
        body:
          type: string
          nullable: true
          example: Big shoutout to the seniors for leading by example.
        data:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Type-specific payload. Shape varies per `type` — consult the Notifications doc (or the controller) for the shape matching a given type. Do not assume fixed keys are present.
        isRead:
          type: boolean
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    PaginatedNotifications:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationResponse"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    NotificationUnreadCount:
      type: object
