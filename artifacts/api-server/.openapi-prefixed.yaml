    ApiKey:
      type: object
      required:
        - id
        - name
        - prefix
        - scopes
        - createdAt
        - lastUsedAt
        - revokedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Owner-supplied human label.
          example: Cardinal Track & Field
        prefix:
          type: string
          description: |
            Short leading slice of the plaintext key (e.g. `kk_a1b2c3d4`),
            safe to display in listings as a recognizable fingerprint.
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent successful authentication with this key.
        revokedAt:
          type: string
          format: date-time
          nullable: true
          description: When set, the key has been revoked and will be rejected on use.
    ApiKeyWithToken:
      allOf:
        - $ref: "#/components/schemas/ApiKey"
        - type: object
          required:
            - token
          properties:
            token:
              type: string
              description: |
                Plaintext API key. Returned exactly once at create time
                and never again — clients must surface it immediately
                and persist it somewhere safe.
    AdminDayCount:
      type: object
      required:
        - day
        - count
      properties:
        day:
          type: string
        count:
          type: integer
          minimum: 0
  responses:
    BadRequest:
      description: Validation error — malformed body, invalid params, or constraint violation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: No valid authentication session
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not authorized for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Request payload is syntactically valid but semantically incorrect
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists (e.g., duplicate slug)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unhandled server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: kinectem_session
      description: |
        Server-issued session token, stored as an `HttpOnly` cookie named
        `kinectem_session`. Set by `POST /auth/login` and `POST /auth/signup`,
        cleared by `POST /auth/logout`. Sessions live for 30 days.

        Browsers send this cookie automatically; `fetch` callers must use
        `credentials: "include"`.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived access token issued by `POST /auth/token` (and
        rotated by `POST /auth/refresh`). Send as
        `Authorization: Bearer <access-token>`. Used by the mobile app
        and any other non-browser client. Tokens are HMAC-signed
        envelopes with a 15-minute expiry; on `401` with code
        `AUTH_REQUIRED`, swap the refresh token for a new pair.
    apiKey:
      type: http
      scheme: bearer
      description: |
        Long-lived **API key** for third-party developer integrations.
        Created and revoked from the developer portal at
        `/dev-portal/api-keys` (or via `POST /auth/api-keys`). Send it
        the same way as a short-lived access token —
        `Authorization: Bearer <key>`. Keys begin with the literal
        prefix `kk_` so the server can route them to the API-key table
        without trying to verify them as access-token envelopes.

        The plaintext key is shown to the caller exactly once at create
        time and never again — store it somewhere safe immediately.
        Only the sha256 hash of the key is persisted server-side.
