kind = "video"
previewPath = "/ai-assist-walkthrough/"
title = "Kinectem AI Assist Walkthrough"
version = "1.0.0"
id = "artifacts/ai-assist-walkthrough"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ai-assist-walkthrough/" ]
localPort = 24144

[services.development]
run = "pnpm --filter @workspace/ai-assist-walkthrough run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-assist-walkthrough", "run", "build" ]
publicDir = "artifacts/ai-assist-walkthrough/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24144"
BASE_PATH = "/ai-assist-walkthrough/"
