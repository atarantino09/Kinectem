openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Kinectem API - social platform for youth athletes
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: organizations
  - name: teams
  - name: invites
  - name: articles
  - name: drafts
  - name: highlights
  - name: tags
  - name: notifications
  - name: feed
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200": { description: Healthy, content: { application/json: { schema: { $ref: "#/components/schemas/HealthStatus" } } } }

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SignupBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/LoginBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204": { description: No Content }

  /me:
    get:
      operationId: getCurrentUser
      tags: [users]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }

  /me/tags:
    get:
      operationId: getMyTags
      tags: [tags]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MyTags" } } } }

  /me/notifications:
    get:
      operationId: getMyNotifications
      tags: [notifications]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Notification" } } } } }

  /me/notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      parameters: [{ name: notificationId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: No Content }

  /me/drafts:
    get:
      operationId: getMyDrafts
      tags: [drafts]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Article" } } } } }

  /me/children:
    get:
      operationId: getMyChildren
      tags: [users]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } } }

  /users:
    get:
      operationId: listUsers
      tags: [users]
      parameters:
        - { name: q, in: query, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } } }

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      parameters: [{ name: userId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/UserProfile" } } } }
    patch:
      operationId: updateUser
      tags: [users]
      parameters: [{ name: userId, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateUserBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }

  /users/{userId}/tagged-content:
    get:
      operationId: getUserTaggedContent
      tags: [users]
      parameters: [{ name: userId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TaggedContent" } } } }

  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Organization" } } } } }
    post:
      operationId: createOrganization
      tags: [organizations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NewOrganization" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Organization" } } } }

  /organizations/{orgId}:
    get:
      operationId: getOrganization
      tags: [organizations]
      parameters: [{ name: orgId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrganizationDetail" } } } }

  /organizations/{orgId}/activity:
    get:
      operationId: getOrganizationActivity
      tags: [organizations]
      parameters: [{ name: orgId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FeedItem" } } } } }

  /teams:
    post:
      operationId: createTeam
      tags: [teams]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NewTeam" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Team" } } } }

  /teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      parameters: [{ name: teamId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TeamDetail" } } } }

  /teams/{teamId}/roster:
    get:
      operationId: getTeamRoster
      tags: [teams]
      parameters: [{ name: teamId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/RosterEntry" } } } } }
    post:
      operationId: addRosterEntry
      tags: [teams]
      parameters: [{ name: teamId, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NewRosterEntry" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/RosterEntry" } } } }

  /teams/{teamId}/invites:
    get:
      operationId: getTeamInvites
      tags: [invites]
      parameters: [{ name: teamId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/RosterInvite" } } } } }
    post:
      operationId: createTeamInvite
      tags: [invites]
      parameters: [{ name: teamId, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NewRosterInvite" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/RosterInvite" } } } }

  /invites/{token}:
    get:
      operationId: getInvite
      tags: [invites]
      parameters: [{ name: token, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RosterInviteDetail" } } } }

  /invites/{token}/accept:
    post:
      operationId: acceptInvite
      tags: [invites]
      parameters: [{ name: token, in: path, required: true, schema: { type: string } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: "#/components/schemas/AcceptInviteBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RosterEntry" } } } }

  /teams/{teamId}/articles:
    get:
      operationId: getTeamArticles
      tags: [teams]
      parameters: [{ name: teamId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Article" } } } } }

  /teams/{teamId}/drafts:
    get:
      operationId: getTeamDrafts
      tags: [drafts]
      parameters: [{ name: teamId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Article" } } } } }

  /teams/{teamId}/highlights:
    get:
      operationId: getTeamHighlights
      tags: [teams]
      parameters: [{ name: teamId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Highlight" } } } } }

  /articles:
    post:
      operationId: createArticle
      tags: [articles]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NewArticle" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Article" } } } }

  /articles/{articleId}:
    get:
      operationId: getArticle
      tags: [articles]
      parameters: [{ name: articleId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ArticleDetail" } } } }
    patch:
      operationId: updateArticle
      tags: [articles]
      parameters: [{ name: articleId, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateArticleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Article" } } } }

  /articles/{articleId}/publish:
    post:
      operationId: publishArticle
      tags: [articles]
      parameters: [{ name: articleId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Article" } } } }

  /articles/{articleId}/co-authors:
    post:
      operationId: addCoAuthor
      tags: [articles]
      parameters: [{ name: articleId, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AddCoAuthorBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Article" } } } }

  /article-tags/{tagId}:
    delete:
      operationId: deleteArticleTag
      tags: [tags]
      parameters: [{ name: tagId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: No Content }

  /highlight-tags/{tagId}:
    delete:
      operationId: deleteHighlightTag
      tags: [tags]
      parameters: [{ name: tagId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: No Content }

  /highlights:
    post:
      operationId: createHighlight
      tags: [highlights]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NewHighlight" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Highlight" } } } }

  /highlights/{highlightId}:
    get:
      operationId: getHighlight
      tags: [highlights]
      parameters: [{ name: highlightId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/HighlightDetail" } } } }

  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FeedItem" } } } } }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    LoginBody:
      type: object
      required: [userId]
      properties:
        userId: { type: string }

    SignupBody:
      type: object
      required: [name, role]
      properties:
        name: { type: string }
        role: { type: string, enum: [athlete, coach, admin, parent] }
        email: { type: string }
        sport: { type: string }
        position: { type: string }
        grade: { type: string }
        location: { type: string }
        dateOfBirth: { type: string, format: date-time }
        parentId: { type: string }

    UpdateUserBody:
      type: object
      properties:
        name: { type: string }
        sport: { type: string }
        position: { type: string }
        jerseyNumber: { type: integer }
        grade: { type: string }
        location: { type: string }
        avatarUrl: { type: string }
        bio: { type: string }
        requireTagConsent: { type: boolean }

    User:
      type: object
      required: [id, name, role]
      properties:
        id: { type: string }
        name: { type: string }
        role: { type: string, enum: [athlete, coach, admin, parent] }
        email: { type: string }
        sport: { type: string }
        position: { type: string }
        jerseyNumber: { type: integer }
        grade: { type: string }
        location: { type: string }
        avatarUrl: { type: string }
        bio: { type: string }
        dateOfBirth: { type: string, format: date-time }
        parentId: { type: string }
        requireTagConsent: { type: boolean }

    UserStats:
      type: object
      properties:
        gamesPlayed: { type: integer }
        primaryStatLabel: { type: string }
        primaryStatValue: { type: string }
        secondaryStatLabel: { type: string }
        secondaryStatValue: { type: string }
        tertiaryStatLabel: { type: string }
        tertiaryStatValue: { type: string }

    UserProfile:
      type: object
      required: [user, teams, stats]
      properties:
        user: { $ref: "#/components/schemas/User" }
        teams:
          type: array
          items: { $ref: "#/components/schemas/UserTeamMembership" }
        stats: { $ref: "#/components/schemas/UserStats" }
        canManageTags: { type: boolean }

    UserTeamMembership:
      type: object
      required: [team, status]
      properties:
        team: { $ref: "#/components/schemas/TeamSummary" }
        status: { type: string, enum: [pending, accepted, declined] }
        role: { type: string, enum: [player, coach] }
        position: { type: string }
        jerseyNumber: { type: integer }

    TaggedContent:
      type: object
      required: [highlights, articles]
      properties:
        highlights:
          type: array
          items: { $ref: "#/components/schemas/Highlight" }
        articles:
          type: array
          items: { $ref: "#/components/schemas/Article" }

    MyTags:
      type: object
      required: [articleTags, highlightTags]
      properties:
        articleTags:
          type: array
          items: { $ref: "#/components/schemas/MyArticleTag" }
        highlightTags:
          type: array
          items: { $ref: "#/components/schemas/MyHighlightTag" }

    MyArticleTag:
      type: object
      required: [tagId, article]
      properties:
        tagId: { type: string }
        article: { $ref: "#/components/schemas/Article" }

    MyHighlightTag:
      type: object
      required: [tagId, highlight]
      properties:
        tagId: { type: string }
        highlight: { $ref: "#/components/schemas/Highlight" }

    Notification:
      type: object
      required: [id, kind, message, read, createdAt]
      properties:
        id: { type: string }
        kind: { type: string }
        message: { type: string }
        link: { type: string }
        read: { type: boolean }
        createdAt: { type: string, format: date-time }

    Organization:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
        sport: { type: string }
        location: { type: string }
        description: { type: string }
        logoUrl: { type: string }
        bannerUrl: { type: string }
        followerCount: { type: integer }

    OrganizationDetail:
      type: object
      required: [organization, teams]
      properties:
        organization: { $ref: "#/components/schemas/Organization" }
        teams:
          type: array
          items: { $ref: "#/components/schemas/TeamSummary" }
        canManage: { type: boolean }

    NewOrganization:
      type: object
      required: [name]
      properties:
        name: { type: string }
        sport: { type: string }
        location: { type: string }
        description: { type: string }

    Team:
      type: object
      required: [id, name, organizationId]
      properties:
        id: { type: string }
        name: { type: string }
        organizationId: { type: string }
        sport: { type: string }
        season: { type: string }

    TeamSummary:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
        organizationId: { type: string }
        organizationName: { type: string }
        sport: { type: string }
        season: { type: string }
        playerCount: { type: integer }

    TeamDetail:
      type: object
      required: [team, organization, roster]
      properties:
        team: { $ref: "#/components/schemas/Team" }
        organization: { $ref: "#/components/schemas/Organization" }
        roster:
          type: array
          items: { $ref: "#/components/schemas/RosterEntry" }
        canManage: { type: boolean }

    NewTeam:
      type: object
      required: [name, organizationId]
      properties:
        name: { type: string }
        organizationId: { type: string }
        sport: { type: string }
        season: { type: string }

    RosterEntry:
      type: object
      required: [id, teamId, user, role, status]
      properties:
        id: { type: string }
        teamId: { type: string }
        user: { $ref: "#/components/schemas/User" }
        role: { type: string, enum: [player, coach] }
        status: { type: string, enum: [pending, accepted, declined] }
        position: { type: string }
        jerseyNumber: { type: integer }
        grade: { type: string }

    NewRosterEntry:
      type: object
      required: [userId, role]
      properties:
        userId: { type: string }
        role: { type: string, enum: [player, coach] }
        position: { type: string }
        jerseyNumber: { type: integer }
        grade: { type: string }

    RosterInvite:
      type: object
      required: [id, token, teamId, invitedEmail, role, status, createdAt]
      properties:
        id: { type: string }
        token: { type: string }
        teamId: { type: string }
        invitedEmail: { type: string }
        invitedName: { type: string }
        role: { type: string, enum: [player, coach] }
        position: { type: string }
        jerseyNumber: { type: integer }
        grade: { type: string }
        status: { type: string, enum: [pending, accepted, expired, revoked] }
        createdAt: { type: string, format: date-time }

    RosterInviteDetail:
      type: object
      required: [invite, team, organization]
      properties:
        invite: { $ref: "#/components/schemas/RosterInvite" }
        team: { $ref: "#/components/schemas/Team" }
        organization: { $ref: "#/components/schemas/Organization" }
        invitedBy: { $ref: "#/components/schemas/User" }

    NewRosterInvite:
      type: object
      required: [invitedEmail, role]
      properties:
        invitedEmail: { type: string }
        invitedName: { type: string }
        role: { type: string, enum: [player, coach] }
        position: { type: string }
        jerseyNumber: { type: integer }
        grade: { type: string }

    AcceptInviteBody:
      type: object
      properties:
        name: { type: string }
        dateOfBirth: { type: string, format: date-time }

    Article:
      type: object
      required: [id, title, teamId, status, createdAt]
      properties:
        id: { type: string }
        title: { type: string }
        teamId: { type: string }
        teamName: { type: string }
        opponentName: { type: string }
        gameDate: { type: string, format: date-time }
        gameScore: { type: string }
        snippet: { type: string }
        body: { type: string }
        coverImageUrl: { type: string }
        status: { type: string, enum: [draft, published] }
        publishedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        author: { $ref: "#/components/schemas/User" }
        coAuthors:
          type: array
          items: { $ref: "#/components/schemas/User" }
        taggedUsers:
          type: array
          items: { $ref: "#/components/schemas/User" }

    ArticleDetail:
      type: object
      required: [article, highlights]
      properties:
        article: { $ref: "#/components/schemas/Article" }
        highlights:
          type: array
          items: { $ref: "#/components/schemas/Highlight" }

    NewArticle:
      type: object
      required: [title, teamId]
      properties:
        title: { type: string }
        teamId: { type: string }
        opponentName: { type: string }
        gameDate: { type: string, format: date-time }
        gameScore: { type: string }
        snippet: { type: string }
        body: { type: string }
        coverImageUrl: { type: string }
        status: { type: string, enum: [draft, published] }
        taggedUserIds:
          type: array
          items: { type: string }
        highlightIds:
          type: array
          items: { type: string }

    UpdateArticleBody:
      type: object
      properties:
        title: { type: string }
        opponentName: { type: string }
        gameDate: { type: string, format: date-time }
        gameScore: { type: string }
        snippet: { type: string }
        body: { type: string }
        coverImageUrl: { type: string }
        taggedUserIds:
          type: array
          items: { type: string }

    AddCoAuthorBody:
      type: object
      required: [userId]
      properties:
        userId: { type: string }

    Highlight:
      type: object
      required: [id, title, teamId]
      properties:
        id: { type: string }
        title: { type: string }
        teamId: { type: string }
        teamName: { type: string }
        articleId: { type: string }
        articleTitle: { type: string }
        thumbnailUrl: { type: string }
        videoUrl: { type: string }
        durationSeconds: { type: integer }
        createdAt: { type: string, format: date-time }
        taggedUsers:
          type: array
          items: { $ref: "#/components/schemas/User" }

    HighlightDetail:
      type: object
      required: [highlight]
      properties:
        highlight: { $ref: "#/components/schemas/Highlight" }
        article: { $ref: "#/components/schemas/Article" }

    NewHighlight:
      type: object
      required: [title, teamId]
      properties:
        title: { type: string }
        teamId: { type: string }
        articleId: { type: string }
        thumbnailUrl: { type: string }
        videoUrl: { type: string }
        durationSeconds: { type: integer }
        taggedUserIds:
          type: array
          items: { type: string }

    FeedItem:
      type: object
      required: [id, kind, createdAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [article, highlight, roster, team] }
        createdAt: { type: string, format: date-time }
        article: { $ref: "#/components/schemas/Article" }
        highlight: { $ref: "#/components/schemas/Highlight" }
        team: { $ref: "#/components/schemas/Team" }
        organization: { $ref: "#/components/schemas/Organization" }
        message: { type: string }
